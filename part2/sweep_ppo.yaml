# W&B Sweep config for PPO hyperparameter search on PandaPush-v3
# Usage:
#   wandb sweep sweep_ppo.yaml          # creates sweep, prints SWEEP_ID
#   wandb agent <SWEEP_ID>              # launches trials on this machine
#
# Each trial runs train_ppo.py with sampled hyperparameters.
# Use --timesteps 200000 for faster sweeps, retrain best config at 500k.

program: train_ppo.py
method: bayes       # bayesian optimization (smarter than random/grid)
command:
  - ..\venv\Scripts\python.exe
  - ${program}
  - ${args}
metric:
  name: rollout/success_rate
  goal: maximize

parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 1e-4
    max: 1e-3
  n_steps:
    values: [512, 1024, 2048]
  batch_size:
    values: [64, 128, 256]
  n_epochs:
    values: [10]
  clip_range:
    values: [0.1, 0.2, 0.3]
  gamma:
    values: [0.99]
  gae_lambda:
    values: [0.97]
  ent_coef:
    values: [0.0, 0.01]
  use_sde:
    values: [True, False]
  sde_sample_freq:
    values: [-1, 1, 4]
  target_kl:
    values: [0.05]
  

# Fixed params for sweep runs (longer timesteps for convergence)
  timesteps:
    value: 1000000
  env_type:
    value: "source"
  sampling_strategy:
    value: "none"

# Early termination: kill underperforming runs
early_terminate:
  type: hyperband
  min_iter: 200000
  eta: 3
